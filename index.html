<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Restaurant RP - Dashboard Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-gray-100 font-sans">

    <nav class="bg-slate-800 p-4 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold text-yellow-500">🍔 Le Coq Hardi - Compta</h1>
        <div>
            <button onclick="switchTab('sales')" class="px-4 py-2 hover:bg-slate-700 rounded">Ventes</button>
            <button onclick="checkAdmin()" class="px-4 py-2 bg-yellow-600 rounded ml-2">Espace Patron</button>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto p-6">
        
        <section id="section-sales" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-slate-800 p-6 rounded-xl shadow-lg">
                <h2 class="text-xl font-semibold mb-4">Enregistrer une Vente</h2>
                <div id="menu-items" class="grid grid-cols-2 gap-3">
                    </div>
                <div class="mt-6 border-t border-slate-700 pt-4">
                    <input type="text" id="emp-name" placeholder="Votre Nom (pour la prime)" class="w-full p-2 bg-slate-700 rounded mb-2">
                </div>
            </div>

            <div class="bg-slate-800 p-6 rounded-xl shadow-lg">
                <h2 class="text-xl font-semibold mb-4">Dernières Ventes</h2>
                <div id="recent-sales" class="text-sm space-y-2 max-h-64 overflow-y-auto"></div>
            </div>
        </section>

        <section id="section-admin" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-center">
                <div class="bg-green-900/40 p-4 rounded-lg border border-green-500">
                    <p class="text-xs uppercase">Trésorerie Totale</p>
                    <span id="total-ca" class="text-2xl font-bold">0 $</span>
                </div>
                <div class="bg-blue-900/40 p-4 rounded-lg border border-blue-500">
                    <p class="text-xs uppercase">Primes à payer</p>
                    <span id="total-primes" class="text-2xl font-bold">0 $</span>
                </div>
                <div class="bg-red-900/40 p-4 rounded-lg border border-red-500">
                    <p class="text-xs uppercase">Stock critique</p>
                    <span id="stock-alert" class="text-2xl font-bold">0</span>
                </div>
            </div>

            <div class="bg-slate-800 p-6 rounded-xl shadow-lg">
                <h3 class="text-lg font-bold mb-4">📦 Gestion des Stocks & Prix</h3>
                <div id="admin-inventory-list" class="space-y-2"></div>
                <button onclick="addNewItem()" class="mt-4 text-sm text-yellow-500 underline">+ Ajouter un article au menu</button>
            </div>
        </section>

    </div>

    <script>
        // CONFIG SUPABASE
        const _URL = "https://oswuzaujjjxvyxvprdlv.supabase.co/";
        const _KEY = "sb_publishable_lNPf5hGMmgNUYbjJUm_eWQ__-bGICli";
        const supabase = supabase.createClient(_URL, _KEY);

        let configPrime = 0.10; // Par défaut 10%

        // INITIALISATION
        async function init() {
            loadMenu();
            loadSales();
            loadPrimes();
        }

        // CHARGER LE MENU DEPUIS SUPABASE
        async function loadMenu() {
            const { data } = await supabase.from('items').select('*');
            const container = document.getElementById('menu-items');
            const adminContainer = document.getElementById('admin-inventory-list');
            
            container.innerHTML = '';
            adminContainer.innerHTML = '';

            data.forEach(item => {
                // Bouton pour employé
                container.innerHTML += `
                    <button onclick="makeSale('${item.name}', ${item.price})" class="bg-slate-700 hover:bg-yellow-600 p-3 rounded text-left transition">
                        ${item.name} <br> <span class="text-xs text-yellow-400">${item.price}$</span>
                    </button>`;
                
                // Ligne pour patron
                adminContainer.innerHTML += `
                    <div class="flex items-center justify-between bg-slate-700 p-2 rounded">
                        <span>${item.name}</span>
                        <div class="space-x-2">
                            <input type="number" onchange="updateItem('${item.id}', 'price', this.value)" value="${item.price}" class="w-16 bg-slate-600 rounded px-1 text-sm" title="Prix"> $
                            <input type="number" onchange="updateItem('${item.id}', 'stock', this.value)" value="${item.stock}" class="w-16 bg-slate-600 rounded px-1 text-sm" title="Stock"> Unités
                        </div>
                    </div>`;
            });
        }

        // ENREGISTRER UNE VENTE
        async function makeSale(name, price) {
            const seller = document.getElementById('emp-name').value || "Anonyme";
            const primeAmount = price * configPrime;

            const { error } = await supabase.from('transactions').insert([
                { label: name, amount: price, seller: seller, prime: primeAmount }
            ]);

            // Baisser le stock de 1
            // (Logique simplifiée : il faudrait une fonction RPC Supabase pour faire stock = stock - 1)
            
            if (!error) {
                alert(`Vendu : ${name} (${price}$)`);
                loadSales();
            }
        }

        // GESTION DES ONGLETS
        function switchTab(tab) {
            document.getElementById('section-sales').classList.toggle('hidden', tab !== 'sales');
            document.getElementById('section-admin').classList.toggle('hidden', tab !== 'admin');
        }

        function checkAdmin() {
            const code = prompt("Code PIN Patron :");
            if (code === "1234") { // À changer pour plus de sécurité
                switchTab('admin');
                loadAdminData();
            } else {
                alert("Accès refusé");
            }
        }

        // Mise à jour en temps réel des stocks/prix par le patron
        async function updateItem(id, field, value) {
            const updateData = {};
            updateData[field] = value;
            await supabase.from('items').update(updateData).eq('id', id);
            loadMenu();
        }

        init();
    </script>
</body>
</html>
